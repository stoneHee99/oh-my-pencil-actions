name: "Oh My Pencil Actions"
description: "Visual diff for Pencil (.pen) design files — auto-generate before/after screenshots and post PR comments on design changes"
author: "stoneHee99"

branding:
  icon: "eye"
  color: "purple"

inputs:
  pen-paths:
    description: "Glob pattern for .pen files to watch (default: **/*.pen)"
    required: false
    default: "**/*.pen"
  output-dir:
    description: "Directory to save screenshots (default: .pencil-preview)"
    required: false
    default: ".pencil-preview"
  comment:
    description: "Post a PR comment with the visual diff report (default: true)"
    required: false
    default: "true"
  artifact:
    description: "Upload screenshots as workflow artifact (default: true)"
    required: false
    default: "true"
  artifact-name:
    description: "Name of the uploaded artifact (default: pencil-design-preview)"
    required: false
    default: "pencil-design-preview"

outputs:
  has-changes:
    description: "Whether any .pen file changes were detected"
    value: ${{ steps.detect.outputs.has_changes }}
  report:
    description: "Path to the generated markdown report"
    value: ${{ steps.generate.outputs.report_path }}
  changed-files:
    description: "List of changed .pen files"
    value: ${{ steps.detect.outputs.files }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install action dependencies
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        npm ci --ignore-scripts

    - name: Get Playwright version
      id: pw-version
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      id: cache-pw
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

    - name: Install Playwright Chromium
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        if [ "${{ steps.cache-pw.outputs.cache-hit }}" = "true" ]; then
          npx playwright install-deps chromium
        else
          npx playwright install chromium --with-deps
        fi

    - name: Build action
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        npm run build

    - name: Detect changed .pen files
      id: detect
      shell: bash
      run: |
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"

        CHANGED_FILES=$(git -c core.quotePath=false diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.pen' || true)

        if [ -z "$CHANGED_FILES" ]; then
          echo "No .pen files changed"
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Changed .pen files:"
        echo "$CHANGED_FILES"
        echo "has_changes=true" >> "$GITHUB_OUTPUT"
        echo "files<<EOF" >> "$GITHUB_OUTPUT"
        echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Generate visual diffs
      id: generate
      if: steps.detect.outputs.has_changes == 'true'
      shell: bash
      run: |
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        OUTPUT_DIR="${{ inputs.output-dir }}"
        ACTION_PATH="${{ github.action_path }}"

        mkdir -p "$OUTPUT_DIR"

        while IFS= read -r pen_file; do
          [ -z "$pen_file" ] && continue
          echo "Processing: $pen_file"

          # Extract base version of the file
          mkdir -p /tmp/pen-base
          BASE_FILE="/tmp/pen-base/$(basename "$pen_file")"
          git show "$BASE_SHA:$pen_file" > "$BASE_FILE" 2>/dev/null || echo '{"version":"0","children":[]}' > "$BASE_FILE"

          # Generate before/after screenshots (sanitize subdir name to ASCII)
          RAW_NAME=$(basename "$pen_file" .pen)
          SAFE_DIR=$(echo "$RAW_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          SUBDIR="$OUTPUT_DIR/$SAFE_DIR"
          echo "Output subdir: $SUBDIR (from: $RAW_NAME)"
          node "$ACTION_PATH/dist/main.js" "$BASE_FILE" "$pen_file" --output-dir "$SUBDIR"
          echo "Generated files:"
          ls -la "$SUBDIR"/ 2>/dev/null || echo "  (no files)"
        done <<< "${{ steps.detect.outputs.files }}"

        echo "All output files:"
        find "$OUTPUT_DIR" -type f 2>/dev/null || echo "  (none)"
        echo "report_path=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

    - name: Upload artifact
      if: steps.detect.outputs.has_changes == 'true' && inputs.artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-dir }}/

    - name: Upload overview screenshots to release
      if: steps.detect.outputs.has_changes == 'true' && inputs.comment == 'true'
      id: upload
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        OUTPUT_DIR="${{ inputs.output-dir }}"
        RUN_ID="${{ github.run_id }}"
        TAG="preview-${RUN_ID}"
        TMPDIR=$(mktemp -d)
        URL_MAP="/tmp/image-urls.txt"
        > "$URL_MAP"

        # Delete existing release with same tag (e.g. from rerun)
        gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true

        echo "Looking for overview-images.txt in $OUTPUT_DIR..."
        ls -la "$OUTPUT_DIR"/ || true

        # Collect overview images from all subdirs
        for listfile in "$OUTPUT_DIR"/*/overview-images.txt; do
          [ -f "$listfile" ] || continue
          echo "Found: $listfile"
          while IFS= read -r img_path || [ -n "$img_path" ]; do
            [ -z "$img_path" ] && continue
            echo "  Image: $img_path (exists: $([ -f "$img_path" ] && echo yes || echo no))"
            [ -f "$img_path" ] || continue

            BASENAME=$(basename "$img_path")
            SAFE_NAME=$(echo "$BASENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            cp "$img_path" "$TMPDIR/$SAFE_NAME"
            echo "${img_path}=${SAFE_NAME}" >> "$URL_MAP"
          done < "$listfile"
        done

        echo "Files in TMPDIR:"
        ls -la "$TMPDIR"/ || true

        # Create release only if we have files to upload
        if ls "$TMPDIR"/*.png >/dev/null 2>&1; then
          gh release create "$TAG" "$TMPDIR"/*.png \
            --repo "${{ github.repository }}" \
            --title "Preview: run ${RUN_ID}" \
            --notes "Screenshots for PR #${{ github.event.pull_request.number }}. Safe to delete." \
            --prerelease
        else
          echo "No overview images found to upload"
        fi

        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        echo "url_map=${URL_MAP}" >> "$GITHUB_OUTPUT"

    - name: Post PR comment
      if: steps.detect.outputs.has_changes == 'true' && inputs.comment == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const outputDir = '${{ inputs.output-dir }}';
          const urlMapPath = '${{ steps.upload.outputs.url_map }}';
          const tag = '${{ steps.upload.outputs.tag }}';
          const repo = '${{ github.repository }}';

          // Parse URL map: local_img_path=safe_asset_name
          const imageUrls = new Map();
          if (fs.existsSync(urlMapPath)) {
            const content = fs.readFileSync(urlMapPath, 'utf-8').trim();
            if (content) {
              for (const line of content.split('\n')) {
                const eqIdx = line.indexOf('=');
                if (eqIdx > 0) {
                  const localPath = line.slice(0, eqIdx);
                  const assetName = line.slice(eqIdx + 1);
                  const url = `https://github.com/${repo}/releases/download/${tag}/${assetName}`;
                  imageUrls.set(localPath, url);
                }
              }
            }
          }

          let body = '# 🎨 Pencil Design Preview\n\n';

          const dirs = fs.readdirSync(outputDir, { withFileTypes: true })
            .filter(d => d.isDirectory());

          for (const dir of dirs) {
            const reportPath = path.join(outputDir, dir.name, 'report.md');
            if (fs.existsSync(reportPath)) {
              let report = fs.readFileSync(reportPath, 'utf-8');

              // Replace local image paths with release URLs for overview images
              // For non-overview images (not uploaded), remove the image markdown
              report = report.replace(
                /!\[([^\]]*)\]\(([^)]+\.png)\)/g,
                (match, alt, localPath) => {
                  const url = imageUrls.get(localPath);
                  if (url) return `![${alt}](${url})`;
                  // Remove non-overview images (keep text report only)
                  return '';
                }
              );

              // Clean up empty table rows left after removing images
              report = report.replace(/\| Before \| After \|\n\|--------\|-------\|\n\|  \|  \|/g, '');

              body += report + '\n\n---\n\n';
            }
          }

          body += '\n> 📸 Full screenshots available in [Actions artifacts](' +
            `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})` +
            '\n\n> Generated by [**oh-my-pencil-actions**](https://github.com/stoneHee99/oh-my-pencil-actions)';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c =>
            c.user?.type === 'Bot' && c.body?.includes('Pencil Design Preview')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
